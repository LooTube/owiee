<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>owiee</title>
<link rel="icon" href="favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Lexend:wght@100..900&family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Roboto',sans-serif;background-color:cyan;color:green;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:36px 20px;}
h1{font-size:2.5rem;font-weight:900;color:green;margin-bottom:28px;}
.card{background:rgba(0,180,0,0.1);border:3px solid green;border-radius:12px;padding:28px 26px;width:100%;max-width:480px;}
.card h2{font-size:1.1rem;font-weight:700;color:darkgreen;margin-bottom:16px;}
label{display:block;font-weight:700;margin-bottom:5px;color:darkgreen;}
input,select{width:100%;padding:10px 13px;border:2px solid green;border-radius:7px;background:white;color:green;font-family:'Roboto',sans-serif;font-size:1rem;margin-bottom:14px;outline:none;}
input:focus,select:focus{border-color:darkgreen;}
button{width:100%;padding:12px;background:green;color:cyan;border:none;border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer;font-family:'Roboto',sans-serif;margin-bottom:10px;transition:background 0.2s;}
button:hover{background:darkgreen;}
.msg{color:darkgreen;font-weight:700;margin-top:6px;display:none;}
.toolbar{display:flex;gap:10px;margin-top:18px;}
.toolbar button{width:auto;flex:1;padding:10px;font-size:0.95rem;}
.attach-preview{margin-top:8px;color:darkgreen;font-size:0.92rem;font-weight:600;}
.emoji-bar{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;}
.emoji-item{font-size:1.5rem;cursor:pointer;padding:3px 5px;border-radius:5px;transition:background 0.15s;}
.emoji-item:hover{background:rgba(0,128,0,0.2);}
.chat-box{border:2px solid green;border-radius:8px;background:white;min-height:80px;max-height:160px;overflow-y:auto;padding:10px;margin-bottom:10px;color:darkgreen;}
.chat-input{width:100%;padding:10px 13px;border:2px solid green;border-radius:7px;background:white;color:green;font-family:'Roboto',sans-serif;font-size:1rem;margin-bottom:8px;outline:none;}
nav{margin-top:24px;display:flex;gap:14px;}
nav a{color:darkgreen;font-weight:600;text-decoration:underline;}
nav a:hover{color:#004400;}
footer{margin-top:30px;color:darkgreen;font-size:0.85rem;}
</style>
</head>
<body>
<h1>owiee</h1>
<div class="card">
<h2>Join a Server</h2>
<label>Invite Code or Server Name</label>
<input type="text" id="join-input" placeholder="Enter invite code or server name">
<button onclick="joinserver()">Join Server</button>
<div class="msg" id="join-msg"></div>
<hr style="border:1px solid green;margin:18px 0;">
<h2>Server Chat</h2>
<div class="chat-box" id="server-chat-box"></div>
<input type="text" class="chat-input" id="server-chat-input" placeholder="Type a message..." oninput="type()">
<div class="emoji-bar" id="emoji-bar"></div>
<div class="attach-preview" id="attach-preview"></div>
<div class="toolbar">
<button onclick="emojiandstickerandgif()">😀 Emoji / Sticker / GIF</button>
<button onclick="attachment()">📎 Attachment</button>
<button onclick="sendservermsg()">Send</button>
</div>
<input type="file" id="file-attach" style="display:none" onchange="handleattach()">
</div>
<nav>
<a href="index.html">Home</a>
</nav>
<footer>&copy; Lootube.github.io</footer>
<script>
window.emojiOpen = false;
window.emojis = ['😀','😂','🥹','😎','🤩','😍','🤔','😅','🎉','🔥','💯','👍','❤️','✨','🌟','🎮','🐱','🦊','🐸','🍕'];

function joinserver() {
var val = document.getElementById('join-input').value.trim();
var msg = document.getElementById('join-msg');
if (!val) {
msg.textContent = 'Please enter an invite code or server name.';
msg.style.color = 'red';
msg.style.display = 'block';
return;
}
msg.textContent = 'Joined server: ' + val;
msg.style.color = 'darkgreen';
msg.style.display = 'block';
document.getElementById('join-input').value = '';
}

function type() {}

function attachment() {
document.getElementById('file-attach').click();
}

function handleattach() {
var files = document.getElementById('file-attach').files;
if (files.length > 0) {
document.getElementById('attach-preview').textContent = 'Attached: ' + files[0].name;
}
}

function emojiandstickerandgif() {
window.emojiOpen = !window.emojiOpen;
var bar = document.getElementById('emoji-bar');
bar.innerHTML = '';
if (!window.emojiOpen) return;
window.emojis.forEach(function(e) {
var sp = document.createElement('span');
sp.className = 'emoji-item';
sp.textContent = e;
sp.onclick = function() { insertemoji(e); };
bar.appendChild(sp);
});
}

function insertemoji(e) {
var input = document.getElementById('server-chat-input');
input.value = input.value + e;
}

function sendservermsg() {
var input = document.getElementById('server-chat-input');
var text = input.value.trim();
var attachText = document.getElementById('attach-preview').textContent;
if (!text && !attachText) return;
var box = document.getElementById('server-chat-box');
var div = document.createElement('div');
div.style.marginBottom = '6px';
div.style.color = 'darkgreen';
if (text) div.textContent = text;
if (attachText) {
var sp = document.createElement('span');
sp.style.display = 'block';
sp.style.fontSize = '0.85rem';
sp.style.color = 'green';
sp.textContent = attachText;
div.appendChild(sp);
}
box.appendChild(div);
box.scrollTop = box.scrollHeight;
input.value = '';
document.getElementById('attach-preview').textContent = '';
document.getElementById('file-attach').value = '';
document.getElementById('emoji-bar').innerHTML = '';
window.emojiOpen = false;
}
</script>
</body>
</html>
