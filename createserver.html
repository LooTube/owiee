<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>owiee</title>
<link rel="icon" href="favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Lexend:wght@100..900&family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Roboto',sans-serif;background-color:cyan;color:green;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:36px 20px;}
h1{font-size:2.5rem;font-weight:900;color:green;margin-bottom:28px;}
.layout{display:flex;gap:22px;width:100%;max-width:820px;align-items:flex-start;}
.card{background:rgba(0,180,0,0.1);border:3px solid green;border-radius:12px;padding:24px 22px;flex:1;}
.card h2{font-size:1.1rem;font-weight:700;color:darkgreen;margin-bottom:14px;}
label{display:block;font-weight:700;margin-bottom:5px;color:darkgreen;}
input,select,textarea{width:100%;padding:10px 13px;border:2px solid green;border-radius:7px;background:white;color:green;font-family:'Roboto',sans-serif;font-size:1rem;margin-bottom:14px;outline:none;resize:vertical;}
input:focus,select:focus,textarea:focus{border-color:darkgreen;}
button{width:100%;padding:12px;background:green;color:cyan;border:none;border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer;font-family:'Roboto',sans-serif;margin-bottom:10px;transition:background 0.2s;}
button:hover{background:darkgreen;}
.error{color:red;font-weight:600;margin-bottom:8px;display:none;}
.server-log{background:rgba(0,180,0,0.08);border:2px solid green;border-radius:8px;padding:12px;margin-top:10px;min-height:80px;max-height:180px;overflow-y:auto;}
.server-log .entry{padding:5px 0;border-bottom:1px solid rgba(0,128,0,0.2);color:darkgreen;font-size:0.97rem;}
.role-section{margin-top:14px;}
.role-section h3{font-size:0.98rem;font-weight:700;color:darkgreen;margin-bottom:8px;}
.role-list{list-style:none;margin-bottom:8px;}
.role-list li{display:flex;justify-content:space-between;align-items:center;padding:7px 10px;background:rgba(0,128,0,0.1);border-radius:7px;margin-bottom:5px;font-weight:600;color:darkgreen;}
.role-list li .perms{font-size:0.82rem;color:green;margin-left:8px;}
nav{margin-top:24px;display:flex;gap:14px;}
nav a{color:darkgreen;font-weight:600;text-decoration:underline;}
nav a:hover{color:#004400;}
footer{margin-top:30px;color:darkgreen;font-size:0.85rem;}
</style>
</head>
<body>
<h1>owiee</h1>
<div class="layout">
<div class="card">
<h2>Create Server</h2>
<label>Server Name</label>
<input type="text" id="server-name-input" placeholder="Server name">
<div class="error" id="name-error"></div>
<label>Server Type</label>
<select id="server-type" onchange="type()">
<option value="public">Public</option>
<option value="private">Private</option>
<option value="community">Community</option>
</select>
<button onclick="createserver()">Create Server</button>
<div class="server-log" id="server-log"></div>
</div>
<div class="card">
<h2>Server Roles</h2>
<div class="role-section">
<h3>Manage Roles</h3>
<label>Role Name</label>
<input type="text" id="role-name-input" placeholder="Role name">
<label>Permissions</label>
<select id="role-perm" onchange="rolepermission()">
<option value="admin">Admin</option>
<option value="moderator">Moderator</option>
<option value="member">Member</option>
<option value="guest">Guest</option>
</select>
<button onclick="role()">Add Role</button>
<ul class="role-list" id="role-list"></ul>
</div>
</div>
</div>
<nav>
<a href="index.html">Home</a>
</nav>
<footer>&copy; Lootube.github.io</footer>
<script>
window.servers = [];
window.roles = [];

function nameservererror(msg) {
document.getElementById('name-error').textContent = msg;
document.getElementById('name-error').style.display = 'block';
}

function nameserver() {
return document.getElementById('server-name-input').value.trim();
}

function type() {}

function createserver() {
document.getElementById('name-error').style.display = 'none';
if (!nameserver()) {
nameservererror('You have not name any yet');
return;
}
window.servers.push({name: nameserver(), type: document.getElementById('server-type').value});
logserver('Server "' + nameserver() + '" created (' + document.getElementById('server-type').value + ')');
document.getElementById('server-name-input').value = '';
}

function logserver(msg) {
var log = document.getElementById('server-log');
var entry = document.createElement('div');
entry.className = 'entry';
entry.textContent = msg;
log.appendChild(entry);
log.scrollTop = log.scrollHeight;
}

function rolepermission() {}

function role() {
var rname = document.getElementById('role-name-input').value.trim();
if (!rname) return;
var perm = document.getElementById('role-perm').value;
window.roles.push({name: rname, perm: perm});
document.getElementById('role-name-input').value = '';
renderroles();
}

function renderroles() {
var list = document.getElementById('role-list');
list.innerHTML = '';
window.roles.forEach(function(r) {
var li = document.createElement('li');
li.textContent = r.name;
var sp = document.createElement('span');
sp.className = 'perms';
sp.textContent = r.perm;
li.appendChild(sp);
list.appendChild(li);
});
}
</script>
</body>
</html>
