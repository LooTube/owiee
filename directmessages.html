<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>owiee</title>
<link rel="icon" href="favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Lexend:wght@100..900&family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Roboto',sans-serif;background-color:cyan;color:green;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:30px 20px;}
h1{font-size:2.5rem;font-weight:900;color:green;margin-bottom:28px;}
.dm-container{display:flex;gap:20px;width:100%;max-width:820px;}
.sidebar{background:rgba(0,180,0,0.1);border:3px solid green;border-radius:12px;padding:18px;width:230px;min-width:170px;}
.sidebar h2{font-size:1rem;font-weight:700;color:darkgreen;margin-bottom:12px;}
.friend-input{width:100%;padding:9px 11px;border:2px solid green;border-radius:7px;background:white;color:green;font-family:'Roboto',sans-serif;font-size:0.95rem;margin-bottom:8px;outline:none;}
.sidebar button{width:100%;padding:9px;background:green;color:cyan;border:none;border-radius:7px;font-size:0.95rem;font-weight:700;cursor:pointer;font-family:'Roboto',sans-serif;margin-bottom:6px;transition:background 0.2s;}
.sidebar button:hover{background:darkgreen;}
.sidebar button.del{background:#b00000;color:#fff;}
.sidebar button.del:hover{background:#800000;}
.friend-list{list-style:none;margin-top:10px;}
.friend-list li{padding:8px 10px;border-radius:7px;background:rgba(0,128,0,0.1);margin-bottom:6px;cursor:pointer;font-weight:600;color:darkgreen;display:flex;justify-content:space-between;align-items:center;}
.friend-list li.active{background:green;color:cyan;}
.friend-list li span.delbtn{cursor:pointer;color:red;font-weight:900;margin-left:8px;}
.chat-area{flex:1;background:rgba(0,180,0,0.07);border:3px solid green;border-radius:12px;display:flex;flex-direction:column;min-height:420px;}
.chat-messages{flex:1;padding:18px;overflow-y:auto;min-height:300px;display:flex;flex-direction:column;gap:10px;}
.msg-bubble{background:rgba(0,128,0,0.15);border-radius:9px;padding:10px 14px;max-width:80%;color:darkgreen;font-size:1rem;}
.msg-bubble.me{align-self:flex-end;background:green;color:cyan;}
.chat-input-row{display:flex;gap:8px;padding:14px;border-top:2px solid green;}
.chat-input-row input{flex:1;padding:10px 13px;border:2px solid green;border-radius:8px;background:white;color:green;font-family:'Roboto',sans-serif;font-size:1rem;outline:none;}
.chat-input-row button{padding:10px 16px;background:green;color:cyan;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-family:'Roboto',sans-serif;transition:background 0.2s;}
.chat-input-row button:hover{background:darkgreen;}
nav{margin-top:24px;display:flex;gap:14px;}
nav a{color:darkgreen;font-weight:600;text-decoration:underline;}
nav a:hover{color:#004400;}
footer{margin-top:30px;color:darkgreen;font-size:0.85rem;}
</style>
</head>
<body>
<h1>owiee</h1>
<div class="dm-container">
<div class="sidebar">
<h2>Friends</h2>
<input type="text" class="friend-input" id="friend-name-input" placeholder="Add friend...">
<button onclick="createfriend()">Add Friend</button>
<ul class="friend-list" id="friend-list"></ul>
</div>
<div class="chat-area">
<div class="chat-messages" id="chat-messages"></div>
<div class="chat-input-row">
<input type="text" id="msg-input" placeholder="Type a message..." oninput="type()">
<button onclick="sendmsg()">Send</button>
</div>
</div>
</div>
<nav>
<a href="index.html">Home</a>
</nav>
<footer>&copy; Lootube.github.io</footer>
<script>
window.friends = [];
window.selectedFriend = null;
window.messages = {};

function createfriend() {
var name = document.getElementById('friend-name-input').value.trim();
if (!name) return;
if (window.friends.indexOf(name) !== -1) return;
window.friends.push(name);
window.messages[name] = [];
document.getElementById('friend-name-input').value = '';
renderfriends();
}

function deletefriend(name) {
window.friends = window.friends.filter(function(f){ return f !== name; });
if (window.selectedFriend === name) {
window.selectedFriend = null;
document.getElementById('chat-messages').innerHTML = '';
}
renderfriends();
}

function renderfriends() {
var list = document.getElementById('friend-list');
list.innerHTML = '';
window.friends.forEach(function(f) {
var li = document.createElement('li');
li.className = window.selectedFriend === f ? 'active' : '';
li.onclick = function(){ selectfriend(f); };
li.textContent = f;
var del = document.createElement('span');
del.className = 'delbtn';
del.textContent = '✕';
del.onclick = function(e){ e.stopPropagation(); deletefriend(f); };
li.appendChild(del);
list.appendChild(li);
});
}

function selectfriend(name) {
window.selectedFriend = name;
renderfriends();
renderchat();
}

function renderchat() {
var area = document.getElementById('chat-messages');
area.innerHTML = '';
if (!window.selectedFriend) return;
(window.messages[window.selectedFriend] || []).forEach(function(m) {
var div = document.createElement('div');
div.className = 'msg-bubble' + (m.me ? ' me' : '');
div.textContent = m.text;
area.appendChild(div);
});
area.scrollTop = area.scrollHeight;
}

function type() {}

function sendmsg() {
if (!window.selectedFriend) return;
var input = document.getElementById('msg-input');
var text = input.value.trim();
if (!text) return;
window.messages[window.selectedFriend].push({text: text, me: true});
input.value = '';
renderchat();
}
</script>
</body>
</html>
