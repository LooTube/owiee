<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>owiee</title>
<link rel="icon" href="favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Lexend:wght@100..900&family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Roboto',sans-serif;background-color:cyan;color:green;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;}
h1{font-size:3rem;font-weight:900;color:green;margin-bottom:32px;}
.card{background:rgba(0,180,0,0.1);border:3px solid green;border-radius:12px;padding:36px 32px;width:100%;max-width:380px;text-align:center;}
.card p{font-size:1.2rem;font-weight:600;color:darkgreen;margin-bottom:24px;}
button{width:100%;padding:13px;background:green;color:cyan;border:none;border-radius:8px;font-size:1.1rem;font-weight:700;cursor:pointer;font-family:'Roboto',sans-serif;transition:background 0.2s;margin-bottom:12px;}
button:hover{background:darkgreen;}
.msg{color:darkgreen;font-weight:700;margin-top:10px;display:none;}
nav{margin-top:24px;display:flex;gap:14px;}
nav a{color:darkgreen;font-weight:600;text-decoration:underline;}
nav a:hover{color:#004400;}
footer{margin-top:40px;color:darkgreen;font-size:0.85rem;}
</style>
</head>
<body>
<h1>owiee</h1>
<div class="card">
<p>Are you sure you want to logout?</p>
<button onclick="logout()">Logout</button>
<div class="msg" id="logout-msg">You have been logged out.</div>
</div>
<nav>
<a href="login.html">Login</a>
<a href="index.html">Home</a>
</nav>
<footer>&copy; Lootube.github.io</footer>
<script>
function logout() {
document.getElementById('logout-msg').style.display = 'block';
}
</script>
</body>
</html>
